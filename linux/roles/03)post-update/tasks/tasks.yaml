---
- name: Display postcheck banner
  debug:
    msg: "Starting post validation on {{ inventory_hostname }}"

- name: Wait for SSH after reboot
  wait_for_connection:
    timeout: 300

- name: Check system uptime
  command: uptime
  register: uptime_output
  changed_when: false

- name: Display uptime
  debug:
    var: uptime_output.stdout

- name: Get new kernel version
  command: uname -r
  register: new_kernel
  changed_when: false

- name: Display new kernel version
  debug:
    var: new_kernel.stdout

- name: Gather service facts
  service_facts:

- name: Ensure sshd service running
  systemd:
    name: sshd
    state: started

- name: Ensure chronyd service running
  systemd:
    name: chronyd
    state: started
  failed_when: false

- name: Save package list after patching
  shell: |
    rpm -qa | sort > /tmp/packages_after_patch.txt
  changed_when: false

- name: Generate patch report
  copy:
    dest: /tmp/patch_report.txt
    content: |
      ===================================
      PATCH REPORT
      ===================================

      Hostname: {{ inventory_hostname }}

      Previous Kernel:
      {{ current_kernel.stdout | default('N/A') }}

      Current Kernel:
      {{ new_kernel.stdout }}

      Root Usage:
      {{ root_usage.stdout | default('N/A') }}%

      Boot Usage:
      {{ boot_usage.stdout | default('N/A') }}%

      Patch Time:
      {{ ansible_date_time.iso8601 }}

      Status:
      SUCCESS

- name: Display patch completion message
  debug:
    msg: "Patching completed successfully"