---
- name: Display patching banner
  debug:
    msg: "Starting OS patching on {{ inventory_hostname }}"

- name: Clean yum cache
  command: yum clean all
  changed_when: false

- name: Check available updates
  yum:
    list: updates
  register: available_updates

- name: Display available updates
  debug:
    var: available_updates.results

- name: Apply all security and bugfix patches
  yum:
    name: '*'
    state: latest
    update_only: true
  register: yum_update

- name: Display patching results
  debug:
    var: yum_update.results

- name: Check if reboot required
  shell: |
    needs-restarting -r
  register: reboot_required
  failed_when: false
  changed_when: false

- name: Display reboot status
  debug:
    msg: "Reboot required"
  when: reboot_required.rc != 0

- name: Reboot server
  reboot:
    reboot_timeout: 1800
    connect_timeout: 30
    test_command: whoami
  when:
    - patch_reboot
    - reboot_required.rc != 0